databases:
  - name: bezeta-tareas-db
    plan: free
    databaseName: bezeta_tareas
    user: bezeta_tareas

services:
  - type: web
    name: bezeta-tareas-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ""
      - key: CORS_ALLOWED_ORIGINS
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: bezeta-tareas-db
          property: connectionString
