# Por ahora solo se despliega el frontend (sin backend ni base de datos), para
# poder visualizar la interfaz. El servicio de backend (Django + Postgres/Supabase)
# se vuelve a agregar aqui cuando se retome esa parte del despliegue.

services:
  - type: web
    name: bezeta-tareas-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: ""
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
